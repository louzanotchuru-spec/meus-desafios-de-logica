<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nuclear Control Panel - FIAP</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00; /* Verde Matrix/Terminal */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #111;
            padding: 30px;
            border: 2px solid #333;
            border-radius: 5px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        h1 { text-align: center; color: #ff0000; text-transform: uppercase; letter-spacing: 2px; }

        label { display: block; margin-top: 15px; color: #00ff00; }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .switch-group {
            margin: 20px 0;
            padding: 10px;
            border: 1px dashed #ff0000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { background-color: #990000; }

        #resultado-logica {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #00ff00;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>☢️ Reactor Control</h1>
        
        <label>Temperatura do Núcleo (°C)</label>
        <input type="number" id="tempInput" placeholder="Ex: 500">

        <label>Pressão Interna (atm)</label>
        <input type="number" id="presInput" placeholder="Ex: 80">

        <label>Hastes de Resfriamento (%)</label>
        <input type="number" id="hastesInput" placeholder="0 a 100">

        <div class="switch-group">
            <span>INTERRUPÇÃO MANUAL</span>
            <input type="checkbox" id="manualSwitch">
        </div>

        <button id="btnCheck">Verificar Status</button>

        <div id="resultado-logica">SISTEMA ONLINE</div>
    </div>

    <script>
const btn = document.getElementById('btnCheck');
const monitor = document.getElementById('resultado-logica');

btn.addEventListener('click', () => {
    
    const temp = parseFloat(document.getElementById('tempInput').value);
    const pres = parseFloat(document.getElementById('presInput').value);
    const hastes = parseFloat(document.getElementById('hastesInput').value);
    const manual = document.getElementById('manualSwitch').checked;

    let msg = "";
    let cor = "";

    // VALIDAÇÃO
    if (isNaN(temp) || isNaN(pres) || isNaN(hastes)) {
        msg = "ERRO: SENSORES ILEGÍVEIS";
        cor = "#ffff00";
    }

    // PRIORIDADE MÁXIMA: INTERRUPÇÃO MANUAL
    else if (manual) {
        msg = "REATOR DESLIGADO MANUALMENTE";
        cor = "#ff0000";
    }

    // SITUAÇÃO CRÍTICA
    else if (temp > 1000 || pres > 150 || hastes < 20) {
        msg = "FALHA CRÍTICA! RISCO DE COLAPSO!";
        cor = "#ff0000";
    }

    // ALERTA
    else if (temp > 800 || pres > 100 || hastes < 50) {
        msg = "ALERTA: AJUSTES NECESSÁRIOS";
        cor = "#ffff00";
    }

    // ESTÁVEL
    else {
        msg = "SISTEMA ESTÁVEL";
        cor = "#00ff00";
    }

    monitor.innerText = msg;
    monitor.style.color = cor;
});
</script>
</body>
</html>
